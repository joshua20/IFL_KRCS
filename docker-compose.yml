services:
  backend:
    build: ./krcsboard
    container_name: krcs_backend
    volumes:
      - ./krcsboard:/app
    ports:
      - "8000:8000"
    env_file:
      - ./krcsboard/.env
    depends_on:
      - db

  frontend:
    build: ./IFSL-dashboard
    container_name: krcs_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  db:
    image: postgis/postgis:15-3.4
    container_name: krcs_db
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
    - postgres_data:/var/lib/postgresql/data/
volumes:
  postgres_data: